<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="macGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="punchGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#roundedRect)">
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle radial glow behind action -->
    <circle cx="512" cy="480" r="350" fill="#F97316" opacity="0.06"/>

    <!-- MacBook Body - tilted slightly for dynamic pose -->
    <g transform="translate(220, 280) rotate(-8, 200, 150)">
      <!-- Base/keyboard -->
      <path d="M 60,195 L 340,195 L 360,240 L 40,240 Z" fill="url(#macGrad)" opacity="0.9"/>
      <!-- Hinge -->
      <rect x="80" y="188" width="240" height="8" rx="2" fill="#6B7280"/>
      <!-- Screen back -->
      <rect x="70" y="20" width="260" height="170" rx="10" fill="url(#macGrad)"/>
      <!-- Screen -->
      <rect x="82" y="30" width="236" height="148" rx="6" fill="#111827"/>
      <!-- Screen content - angry face -->
      <circle cx="160" cy="95" r="8" fill="url(#screenGrad)"/>
      <circle cx="220" cy="95" r="8" fill="url(#screenGrad)"/>
      <path d="M 155,120 Q 190,145 225,120" stroke="url(#screenGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Angry eyebrows -->
      <line x1="148" y1="80" x2="168" y2="86" stroke="url(#screenGrad)" stroke-width="3" stroke-linecap="round"/>
      <line x1="232" y1="80" x2="212" y2="86" stroke="url(#screenGrad)" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Fist/punch coming from MacBook -->
    <g transform="translate(490, 370)" filter="url(#glow)">
      <!-- Arm -->
      <rect x="-40" y="-10" width="60" height="30" rx="8" fill="url(#macGrad)" transform="rotate(-15)"/>
      <!-- Fist -->
      <circle cx="30" cy="-15" r="28" fill="url(#macGrad)"/>
      <circle cx="30" cy="-15" r="25" fill="#D1D5DB"/>
    </g>

    <!-- Impact burst -->
    <g transform="translate(560, 340)" filter="url(#glowStrong)">
      <!-- Starburst -->
      <polygon points="0,-30 8,-8 30,-10 12,6 18,28 0,16 -18,28 -12,6 -30,-10 -8,-8" fill="url(#punchGrad)" opacity="0.9"/>
      <polygon points="0,-18 5,-5 18,-6 8,4 11,17 0,10 -11,17 -8,4 -18,-6 -5,-5" fill="#FCD34D"/>
    </g>

    <!-- Trash Can - getting punched, tilted and dented -->
    <g transform="translate(600, 300) rotate(20, 80, 100)">
      <!-- Trash body -->
      <path d="M 40,60 L 50,190 Q 55,205 80,205 Q 105,205 120,205 L 130,60 Z" fill="#4B5563" stroke="#6B7280" stroke-width="2"/>
      <!-- Dent from punch -->
      <path d="M 45,80 Q 70,100 50,130" fill="#374151" stroke="#6B7280" stroke-width="1"/>
      <!-- Trash lid - flying off -->
      <g transform="translate(-20, -30) rotate(-35, 90, 40)">
        <rect x="30" y="35" width="110" height="12" rx="4" fill="#6B7280"/>
        <rect x="65" y="25" width="40" height="14" rx="7" fill="#6B7280"/>
      </g>
      <!-- Trash ribs -->
      <line x1="50" y1="90" x2="125" y2="90" stroke="#6B7280" stroke-width="1.5" opacity="0.5"/>
      <line x1="50" y1="120" x2="123" y2="120" stroke="#6B7280" stroke-width="1.5" opacity="0.5"/>
      <line x1="51" y1="150" x2="122" y2="150" stroke="#6B7280" stroke-width="1.5" opacity="0.5"/>
      <line x1="52" y1="180" x2="121" y2="180" stroke="#6B7280" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Flying debris/junk files -->
    <g opacity="0.8">
      <!-- File icons flying away -->
      <g transform="translate(740, 220) rotate(25)">
        <rect width="28" height="35" rx="3" fill="#374151" stroke="#F97316" stroke-width="1"/>
        <path d="M 18,0 L 28,10 L 18,10 Z" fill="#F97316" opacity="0.5"/>
      </g>
      <g transform="translate(770, 350) rotate(40)">
        <rect width="22" height="28" rx="2" fill="#374151" stroke="#EF4444" stroke-width="1"/>
        <path d="M 14,0 L 22,8 L 14,8 Z" fill="#EF4444" opacity="0.5"/>
      </g>
      <g transform="translate(700, 160) rotate(-15)">
        <rect width="18" height="22" rx="2" fill="#374151" stroke="#F97316" stroke-width="1"/>
      </g>
      <g transform="translate(760, 450) rotate(55)">
        <rect width="24" height="30" rx="2" fill="#374151" stroke="#EF4444" stroke-width="1"/>
      </g>
    </g>

    <!-- Speed lines -->
    <g stroke="url(#punchGrad)" stroke-width="2" opacity="0.4" stroke-linecap="round">
      <line x1="200" y1="350" x2="320" y2="360"/>
      <line x1="180" y1="400" x2="310" y2="395"/>
      <line x1="210" y1="450" x2="330" y2="430"/>
      <line x1="190" y1="300" x2="300" y2="310"/>
    </g>

    <!-- Bottom text area -->
    <text x="512" y="750" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="52" font-weight="700" fill="#EEEEEE" letter-spacing="3">MacUninstaller</text>
    <text x="512" y="790" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="22" font-weight="400" fill="#888888" letter-spacing="1">CLEAN YOUR MAC</text>
  </g>
</svg>