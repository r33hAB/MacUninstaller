<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg4" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#0F0F18"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="fireGrad4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="40%" stop-color="#F97316"/>
      <stop offset="80%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FFFBEB"/>
    </linearGradient>
    <linearGradient id="mac4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
    <linearGradient id="orangeRed4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <radialGradient id="impactGlow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#F97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="g4">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="g4glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="g4big">
      <feGaussianBlur stdDeviation="25" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rr4">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rr4)">
    <rect width="1024" height="1024" fill="url(#bg4)"/>

    <!-- Central impact glow -->
    <circle cx="512" cy="380" r="280" fill="url(#impactGlow)" filter="url(#g4big)"/>

    <!-- MacBook - center, powerful stance -->
    <g transform="translate(260, 310)">
      <!-- Shadow under laptop -->
      <ellipse cx="230" cy="290" rx="200" ry="20" fill="#000" opacity="0.3" filter="url(#g4)"/>

      <!-- Base -->
      <path d="M 100,240 L 360,240 L 385,280 L 75,280 Z" fill="url(#mac4)"/>
      <!-- Hinge -->
      <rect x="115" y="232" width="230" height="9" rx="3" fill="#9CA3AF"/>
      <!-- Screen housing -->
      <rect x="105" y="55" width="250" height="180" rx="12" fill="url(#mac4)"/>
      <!-- Screen -->
      <rect x="118" y="67" width="224" height="155" rx="6" fill="#111827"/>

      <!-- Screen face - fierce battle cry -->
      <!-- Eyes - wide and fiery -->
      <g filter="url(#g4glow)">
        <circle cx="190" cy="120" r="12" fill="url(#orangeRed4)"/>
        <circle cx="270" cy="120" r="12" fill="url(#orangeRed4)"/>
        <circle cx="190" cy="118" r="5" fill="#FCD34D"/>
        <circle cx="270" cy="118" r="5" fill="#FCD34D"/>
      </g>
      <!-- Fierce eyebrows -->
      <line x1="172" y1="100" x2="200" y2="108" stroke="#F97316" stroke-width="5" stroke-linecap="round"/>
      <line x1="288" y1="100" x2="260" y2="108" stroke="#F97316" stroke-width="5" stroke-linecap="round"/>
      <!-- Battle cry mouth -->
      <path d="M 195,155 Q 210,175 230,175 Q 250,175 265,155" stroke="#F97316" stroke-width="4" fill="#EF4444" fill-opacity="0.3" stroke-linecap="round"/>

      <!-- Arm reaching up (right side) giving uppercut -->
      <g>
        <!-- Upper arm -->
        <rect x="370" y="170" width="25" height="80" rx="10" fill="url(#mac4)" transform="rotate(-30, 370, 210)"/>
        <!-- Forearm going up -->
        <rect x="395" y="100" width="22" height="80" rx="10" fill="url(#mac4)" transform="rotate(10, 406, 140)"/>
        <!-- Fist -->
        <circle cx="415" cy="95" r="22" fill="url(#mac4)"/>
        <circle cx="415" cy="95" r="19" fill="#E5E7EB"/>
      </g>
    </g>

    <!-- TRASH CAN - being uppercutted, flying up -->
    <g transform="translate(580, 80) rotate(-25, 60, 80)">
      <!-- Trash body -->
      <path d="M 25,45 L 30,140 Q 33,152 55,152 Q 77,152 85,152 L 90,45 Z" fill="#4B5563" stroke="#6B7280" stroke-width="2"/>
      <!-- Ribs -->
      <line x1="32" y1="70" x2="87" y2="70" stroke="#6B7280" stroke-width="1" opacity="0.4"/>
      <line x1="33" y1="95" x2="86" y2="95" stroke="#6B7280" stroke-width="1" opacity="0.4"/>
      <line x1="34" y1="120" x2="85" y2="120" stroke="#6B7280" stroke-width="1" opacity="0.4"/>
      <!-- Dazed face on trash -->
      <text x="58" y="105" text-anchor="middle" font-size="28" fill="#9CA3AF" opacity="0.7">×  ×</text>

      <!-- Lid flying off separately -->
      <g transform="translate(-30, -50) rotate(-40, 60, 30)">
        <rect x="18" y="30" width="75" height="12" rx="4" fill="#6B7280"/>
        <rect x="40" y="22" width="30" height="10" rx="5" fill="#6B7280"/>
      </g>
    </g>

    <!-- UPPERCUT impact effects -->
    <g transform="translate(660, 220)" filter="url(#g4glow)">
      <!-- Impact star -->
      <polygon points="0,-35 10,-10 35,-12 15,5 22,30 0,15 -22,30 -15,5 -35,-12 -10,-10" fill="#FCD34D" opacity="0.8"/>
      <polygon points="0,-20 6,-6 20,-7 9,3 13,18 0,9 -13,18 -9,3 -20,-7 -6,-6" fill="#FFFBEB" opacity="0.6"/>
    </g>

    <!-- Rising flames/energy from MacBook -->
    <g filter="url(#g4glow)" opacity="0.6">
      <path d="M 430,310 Q 425,280 435,260 Q 430,240 440,220" stroke="url(#fireGrad4)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 530,310 Q 535,275 525,255 Q 530,235 520,210" stroke="url(#fireGrad4)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 480,305 Q 475,270 485,250 Q 478,225 488,200" stroke="url(#fireGrad4)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Comic-style "POW" motion lines radiating from impact -->
    <g stroke="#F97316" stroke-width="2" opacity="0.35" stroke-linecap="round">
      <line x1="680" y1="180" x2="750" y2="130"/>
      <line x1="700" y1="220" x2="780" y2="200"/>
      <line x1="690" y1="260" x2="770" y2="270"/>
      <line x1="660" y1="150" x2="710" y2="90"/>
      <line x1="640" y1="130" x2="660" y2="60"/>
    </g>

    <!-- Junk flying out of trash -->
    <g opacity="0.6">
      <rect x="720" y="100" width="18" height="22" rx="2" fill="#374151" stroke="#F97316" stroke-width="1" transform="rotate(35, 729, 111)"/>
      <rect x="600" y="50" width="14" height="18" rx="2" fill="#374151" stroke="#EF4444" stroke-width="1" transform="rotate(-20, 607, 59)"/>
      <circle cx="680" cy="60" r="8" fill="#374151" stroke="#F97316" stroke-width="1"/>
      <rect x="750" y="160" width="16" height="20" rx="2" fill="#374151" stroke="#EF4444" stroke-width="1" transform="rotate(50, 758, 170)"/>
    </g>

    <!-- Ground line -->
    <line x1="200" y1="630" x2="824" y2="630" stroke="#222" stroke-width="1"/>

    <!-- Bottom branding -->
    <g>
      <text x="512" y="720" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="52" font-weight="800" fill="url(#orangeRed4)" letter-spacing="2">MacUninstaller</text>
      <text x="512" y="765" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="20" font-weight="600" fill="#888888" letter-spacing="6">K.O.</text>
    </g>
  </g>
</svg>